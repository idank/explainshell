name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: pip install -r requirements.txt

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: make tests-all
